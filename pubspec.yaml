name: health_tracker
description: 健康症状追踪 — 记录症状、发现规律、生成就诊报告
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理 & 本地存储
  provider: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 路由
  go_router: ^14.0.0

  # 网络
  http: ^1.2.0

  # 工具
  uuid: ^4.0.0
  intl: ^0.19.0
  path_provider: ^2.1.0

  # UI
  flutter_slidable: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  image_picker: ^1.1.0

  # 报告导出
  pdf: ^3.10.0
  printing: ^5.12.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
